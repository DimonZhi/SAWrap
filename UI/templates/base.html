<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SAWrapSA{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="{{ url_for('static', path='css/styles.css') }}?v=20260418c" rel="stylesheet">
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div class="topbar-left">
            <details class="topmenu">
                <summary class="topmenu-summary">
                    Overview
                </summary>
                <div class="topmenu-dropdown">
                    <a href="{{ url_for('goal_page') }}" class="topmenu-item">
                        Цель проекта
                    </a>
                    <a href="{{ url_for('link_page') }}" class="topmenu-item">
                        Ссылка
                    </a>
                    <a href="{{ url_for('methodology_page') }}" class="topmenu-item">
                        Методология разработки
                    </a>
                    <!--
                    <a href="{{ url_for('example_page') }}" class="topmenu-item">
                        Пример
                    </a>
                    -->
                    <a href="{{ url_for('leaderboard_page') }}" class="topmenu-item">
                        Лидерборд
                    </a>
                </div>
            </details>
        </div>

        <div class="topbar-center">
            <a href="{{ url_for('home') }}" class="logo">
                SAWrapSA
            </a>
        </div>

        <div class="topbar-right">
        </div>
    </div>
</header>

<main class="content">
    {% if messages %}
        <div class="flash-container">
            {% for m in messages %}
                <div class="flash flash-{{ m.category }}">{{ m.text }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</main>
<script>
(() => {
    const SCREEN_PADDING = 12;
    const MAX_DROPDOWN_WIDTH = 280;
    const MIN_DROPDOWN_WIDTH = 210;
    const menus = Array.from(document.querySelectorAll(".topmenu"));

    function positionMenu(menu) {
        const dropdown = menu.querySelector(".topmenu-dropdown");
        const summary = menu.querySelector(".topmenu-summary");
        if (!dropdown || !summary) return;

        const rect = summary.getBoundingClientRect();
        const naturalWidth = Math.max(MIN_DROPDOWN_WIDTH, Math.min(MAX_DROPDOWN_WIDTH, dropdown.scrollWidth));
        const desiredWidth = Math.min(naturalWidth, window.innerWidth - SCREEN_PADDING * 2);
        const maxLeft = Math.max(SCREEN_PADDING, window.innerWidth - desiredWidth - SCREEN_PADDING);
        const left = Math.min(Math.max(SCREEN_PADDING, rect.left), maxLeft);
        const top = Math.round(rect.bottom + 8);

        dropdown.style.position = "fixed";
        dropdown.style.left = `${left}px`;
        dropdown.style.top = `${top}px`;
        dropdown.style.right = "auto";
        dropdown.style.width = `${desiredWidth}px`;
    }

    menus.forEach((menu) => {
        menu.addEventListener("toggle", () => {
            if (menu.open) {
                requestAnimationFrame(() => positionMenu(menu));
            }
        });
    });

    const repositionOpenMenus = () => {
        menus.forEach((menu) => {
            if (menu.open) {
                positionMenu(menu);
            }
        });
    };

    window.addEventListener("resize", repositionOpenMenus);
    window.addEventListener("orientationchange", repositionOpenMenus);
})();
</script>
</body>
</html>
