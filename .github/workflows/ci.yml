name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Compile checked modules
        run: make compile

      - name: Run tests
        run: make test

      - name: Run smoke test
        run: make smoke

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build application image
        run: make docker-build IMAGE=sawrap:ci
